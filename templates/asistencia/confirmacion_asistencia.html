<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistencia registrada</title>
    <style>
        :root {
            --success: #047857;
            --success-soft: #ecfdf5;
            --text: #1f2937;
            --muted: #4b5563;
            --primary: #0f766e;
            --primary-hover: #115e59;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(145deg, #ecfdf5, #f8fafc);
            color: var(--text);
            padding: 24px;
        }

        .card {
            width: min(560px, 100%);
            background: #ffffff;
            border-radius: 14px;
            box-shadow: 0 14px 28px rgba(2, 6, 23, 0.08);
            padding: 28px;
            text-align: center;
        }

        .badge {
            display: inline-block;
            background: var(--success-soft);
            color: var(--success);
            border: 1px solid #bbf7d0;
            border-radius: 999px;
            padding: 6px 12px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        h1 {
            margin: 0 0 8px;
            color: var(--success);
        }

        p {
            margin: 0 0 18px;
            color: var(--muted);
        }

        .actions {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            text-decoration: none;
            border-radius: 8px;
            padding: 10px 16px;
            font-weight: 600;
        }

        .btn-primary {
            background: var(--primary);
            color: #ffffff;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-secondary {
            background: #e5e7eb;
            color: #111827;
        }
    </style>
</head>
<body>
    <main class="card">
        <span class="badge">Registro exitoso</span>
        <h1>Asistencia guardada correctamente</h1>
        <p>La informacion fue almacenada en la base de datos. Puedes registrar una nueva asistencia o volver a la pagina principal.</p>
        <div class="actions">
            <a class="btn btn-primary" href="{% url 'asistencia:registrar_asistencia' %}">Registrar otra asistencia</a>
            <a class="btn btn-secondary" href="{% url 'home' %}">Ir al inicio</a>
        </div>
    </main>
</body>
</html>
