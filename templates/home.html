<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio - Taller Formularios</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 2rem;
            background: #f4f6f8;
            color: #1f2937;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
        }

        h1 {
            margin-top: 0;
        }

        .links {
            display: grid;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }

        a {
            display: inline-block;
            text-decoration: none;
            background: #2563eb;
            color: #ffffff;
            padding: 0.7rem 1rem;
            border-radius: 8px;
            text-align: center;
        }

        a:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Inicio</h1>
        <p>Selecciona el formulario que deseas diligenciar.</p>

        <div class="links">
            <a href="{% url 'asistencia:registrar_asistencia' %}">Ir al formulario de asistencia</a>
            <a href="{% url 'solicitudes:registrar_solicitud' %}">Ir al formulario de solicitudes</a>
        </div>
    </div>
</body>
</html>
